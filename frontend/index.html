<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskMind — AI Task Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #12141a;
    --surface2: #1a1d26;
    --surface3: #22263a;
    --border: #2a2e3d;
    --border2: #353a50;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3b0;
    --accent: #6c63ff;
    --accent-glow: rgba(108,99,255,0.25);
    --accent2: #00d9a3;
    --accent3: #ff6b6b;
    --accent4: #ffd166;
    --critical: #ff4757;
    --high: #ff9f43;
    --medium: #6c63ff;
    --low: #00d9a3;
    --radius: 12px;
    --radius-sm: 8px;
    --font: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px; min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 0;
    z-index: 10;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-badge {
    font-family: var(--mono);
    font-size: 9px;
    background: var(--accent-glow);
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 1px 5px; border-radius: 4px;
    margin-left: auto;
  }
  .sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
  .nav-section-label {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
    padding: 0 8px; margin: 16px 0 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s;
    font-size: 14px; font-weight: 500; color: var(--text-dim);
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-glow); color: var(--accent); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: var(--accent); color: white;
    font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
    padding: 0 5px;
  }
  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--border);
  }
  .user-card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    background: var(--surface2); cursor: pointer;
  }
  .user-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #6c63ff, #00d9a3);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-role { font-size: 11px; color: var(--text-muted); }
  .user-status {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2); margin-left: auto;
    box-shadow: 0 0 8px var(--accent2);
  }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    height: 60px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 28px; gap: 16px;
    background: var(--surface);
  }
  .topbar-title { font-size: 18px; font-weight: 700; }
  .topbar-sub { font-size: 13px; color: var(--text-muted); margin-left: 4px; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 12px;
    font-size: 13px; color: var(--text-dim);
    cursor: text; min-width: 220px;
    transition: border-color 0.15s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-box input {
    background: none; border: none; outline: none;
    color: var(--text); font-size: 13px; font-family: var(--font);
    width: 100%;
  }
  .icon-btn {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.15s; color: var(--text-dim);
  }
  .icon-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
  .btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; font-family: var(--font);
    cursor: pointer; transition: all 0.15s; border: none;
  }
  .btn-primary {
    background: var(--accent); color: white;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .btn-primary:hover { background: #7b73ff; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-ai {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border: none;
    box-shadow: 0 0 25px rgba(108,99,255,0.35);
  }
  .btn-ai:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-danger { background: var(--critical); color: white; }
  .btn-danger:hover { background: #ff6b7a; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ── Content ── */
  .content { flex: 1; overflow-y: auto; padding: 28px; }
  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 16px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    right: 0; height: 2px;
  }
  .stat-card.accent::before { background: var(--accent); }
  .stat-card.green::before { background: var(--accent2); }
  .stat-card.orange::before { background: var(--high); }
  .stat-card.red::before { background: var(--critical); }
  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; line-height: 1; margin-bottom: 6px; }
  .stat-meta { font-size: 12px; color: var(--text-muted); }
  .stat-icon {
    position: absolute; right: 16px; top: 16px;
    font-size: 24px; opacity: 0.3;
  }
  .stat-trend { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; }
  .stat-trend.up { color: var(--accent2); }
  .stat-trend.down { color: var(--critical); }

  /* ── Section ── */
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .section-title { font-size: 16px; font-weight: 700; }
  .section-count {
    background: var(--surface3); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 20px; font-size: 12px; color: var(--text-muted);
  }
  .section-actions { margin-left: auto; display: flex; gap: 8px; }

  /* ── Filters ── */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .filter-chip {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.15s; color: var(--text-dim);
  }
  .filter-chip:hover { border-color: var(--border2); color: var(--text); }
  .filter-chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

  /* ── Task Card ── */
  .task-list { display: flex; flex-direction: column; gap: 10px; }
  .task-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    display: flex; align-items: flex-start; gap: 14px;
    transition: all 0.2s; cursor: pointer; position: relative;
    overflow: hidden;
  }
  .task-card:hover {
    border-color: var(--border2);
    background: var(--surface2);
    transform: translateX(3px);
  }
  .task-card.completed { opacity: 0.55; }
  .task-card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
  }
  .task-card.priority-critical::before { background: var(--critical); }
  .task-card.priority-high::before { background: var(--high); }
  .task-card.priority-medium::before { background: var(--medium); }
  .task-card.priority-low::before { background: var(--low); }
  .task-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; margin-top: 2px;
  }
  .task-check:hover { border-color: var(--accent2); }
  .task-check.done { background: var(--accent2); border-color: var(--accent2); color: white; font-size: 11px; }
  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 14px; font-weight: 600; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .task-card.completed .task-title { text-decoration: line-through; color: var(--text-muted); }
  .task-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; }
  .task-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .tag {
    padding: 3px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 500;
    background: var(--surface3); color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .priority-badge {
    padding: 3px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .priority-badge.critical { background: rgba(255,71,87,0.15); color: var(--critical); }
  .priority-badge.high { background: rgba(255,159,67,0.15); color: var(--high); }
  .priority-badge.medium { background: rgba(108,99,255,0.15); color: var(--medium); }
  .priority-badge.low { background: rgba(0,217,163,0.15); color: var(--low); }
  .due-badge {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-muted); font-family: var(--mono);
  }
  .due-badge.overdue { color: var(--critical); }
  .due-badge.soon { color: var(--high); }
  .task-actions {
    display: flex; gap: 6px; opacity: 0;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .task-card:hover .task-actions { opacity: 1; }
  .action-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface3); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--text-muted); transition: all 0.15s;
  }
  .action-btn:hover { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); }
  .action-btn.delete:hover { background: rgba(255,71,87,0.15); color: var(--critical); border-color: var(--critical); }
  .ai-hint {
    font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 4px;
    margin-top: 6px;
  }

  /* ── Empty State ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; margin-bottom: 24px; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    padding: 20px; animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 100%;
    max-width: 520px; max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .modal-close {
    margin-left: auto; width: 30px; height: 30px;
    border-radius: 8px; background: var(--surface2);
    border: 1px solid var(--border); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--text-muted);
  }
  .modal-close:hover { background: var(--surface3); color: var(--text); }

  /* ── Form ── */
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    font-size: 14px; color: var(--text); font-family: var(--font);
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: var(--surface2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ── AI Panel ── */
  .ai-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    margin-bottom: 20px; position: relative; overflow: hidden;
  }
  .ai-panel::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .ai-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-glow); border: 1px solid var(--accent);
    color: var(--accent); padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .ai-panel-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .ai-panel-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
  .ai-schedule-slots { display: flex; flex-direction: column; gap: 8px; }
  .schedule-slot {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: var(--surface2); border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .slot-time { font-family: var(--mono); font-size: 12px; color: var(--accent); width: 50px; flex-shrink: 0; }
  .slot-bar { width: 4px; border-radius: 2px; align-self: stretch; background: var(--accent); flex-shrink: 0; }
  .slot-bar.break-slot { background: var(--border2); }
  .slot-title { font-size: 13px; font-weight: 500; }
  .slot-duration { margin-left: auto; font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

  /* ── Analytics ── */
  .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; color: var(--text-dim); width: 60px; flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; background: var(--surface3); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
  .bar-val { font-size: 12px; font-family: var(--mono); color: var(--text-dim); width: 24px; }
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── Notification Toast ── */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px; z-index: 999;
  }
  .toast {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    animation: slideInRight 0.3s ease; max-width: 320px;
  }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  .toast-icon { font-size: 16px; flex-shrink: 0; }
  .toast-msg { flex: 1; }
  .toast-close { cursor: pointer; color: var(--text-muted); font-size: 14px; flex-shrink: 0; }
  .toast.success { border-left: 3px solid var(--accent2); }
  .toast.error { border-left: 3px solid var(--critical); }
  .toast.info { border-left: 3px solid var(--accent); }
  .toast.ai { border-left: 3px solid #a78bfa; }

  /* ── Loader ── */
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-thinking {
    display: flex; align-items: center; gap: 10px;
    padding: 16px; background: var(--surface2); border-radius: var(--radius-sm);
    border: 1px solid var(--border); color: var(--text-dim); font-size: 13px;
  }

  /* ── Progress Ring ── */
  .progress-ring-wrap { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
  .progress-ring-label {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .progress-val { font-size: 22px; font-weight: 700; }
  .progress-sub { font-size: 10px; color: var(--text-muted); }

  /* ── Insight card ── */
  .insight-card {
    background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(0,217,163,0.08));
    border: 1px solid rgba(108,99,255,0.3); border-radius: var(--radius); padding: 20px;
    margin-bottom: 20px;
  }
  .insight-headline { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .insight-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .insight-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; }
  .insight-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; margin-bottom: 6px; color: var(--text-dim); }
  .insight-bullet { color: var(--accent2); font-size: 10px; margin-top: 3px; }
  .insight-goal {
    margin-top: 16px; padding: 12px; background: var(--surface3);
    border-radius: var(--radius-sm); font-size: 13px;
    border-left: 3px solid var(--accent4); color: var(--text-dim);
  }

  /* ── View tabs ── */
  .view-tabs { display: flex; gap: 4px; }
  .view-tab {
    padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; color: var(--text-muted); transition: all 0.15s;

// ── Utils ─────────────────────────────────────────────────────────
function formatDue(iso) {
  if (!iso) return null;
  const d = new Date(iso), now = new Date();
  const diff = d - now;
  if (diff < 0) return { label: `${Math.round(-diff/3600000)}h overdue`, cls: 'overdue' };
  if (diff < 7200000) return { label: `${Math.round(diff/3600000)}h left`, cls: 'soon' };
  if (diff < 86400000) return { label: `Today ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`, cls: '' };
  return { label: d.toLocaleDateString([], {month:'short',day:'numeric'}), cls: '' };
}
function uid() { return Math.random().toString(36).slice(2); }
const PRI_ORDER = { critical:0, high:1, medium:2, low:3 };

// ── Toast System ──────────────────────────────────────────────────

        React.createElement('span', { className:'toast-close', onClick:()=>removeToast(t.id) }, '✕')
      )
    )
  );
}

// ── Task Card ─────────────────────────────────────────────────────

      }, '🗑')

}

// ── Task Form Modal ───────────────────────────────────────────────

  const handleSave = () => {

    const saved = {
      ...form,
      id: form.id || uid(),
      tags: typeof form.tags === 'string' ? form.tags.split(',').map(t=>t.trim()).filter(Boolean) : form.tags,
      estimated_minutes: parseInt(form.estimated_minutes)||null,
      status: form.status || 'pending',
      created_at: form.created_at || new Date().toISOString(),

// ── Progress Ring ─────────────────────────────────────────────────
function ProgressRing({ pct, color='#6c63ff', size=100 }) {
  const r = 38, cx = 50, cy = 50;
  const circ = 2 * Math.PI * r;
  const dash = circ * (1 - pct/100);
  return React.createElement('div', { className:'progress-ring-wrap', style:{width:size,height:size} },
    React.createElement('svg', { viewBox:'0 0 100 100', style:{transform:'rotate(-90deg)',width:'100%',height:'100%'} },
      React.createElement('circle', { cx, cy, r, fill:'none', stroke:'#22263a', strokeWidth:7 }),
      React.createElement('circle', { cx, cy, r, fill:'none', stroke:color, strokeWidth:7, strokeDasharray:circ, strokeDashoffset:dash, strokeLinecap:'round', style:{transition:'stroke-dashoffset 1s ease'} })
    ),
    React.createElement('div', { className:'progress-ring-label' },
      React.createElement('span', { className:'progress-val' }, pct+'%'),
      React.createElement('span', { className:'progress-sub' }, 'done')

  );
}

function Dashboard({ tasks, onAddTask, onToggle, onDelete, onEdit, toast }) {

  const [showSchedule, setShowSchedule] = useState(false);

  const total = tasks.length;
  const completed = tasks.filter(t=>t.status==='completed').length;
  const pending = tasks.filter(t=>t.status==='pending'||t.status==='in_progress').length;
  const overdue = tasks.filter(t=>t.due_date&&new Date(t.due_date)<new Date()&&t.status!=='completed').length;
  const completionRate = total ? Math.round(completed/total*100) : 0;

  const filtered = tasks
    .filter(t => {
      if (filter==='pending') return t.status==='pending'||t.status==='in_progress';
      if (filter==='completed') return t.status==='completed';
      if (filter==='critical') return t.priority==='critical';
      if (filter==='overdue') return t.due_date&&new Date(t.due_date)<new Date()&&t.status!=='completed';
      return true;
    })
    .filter(t => !search || t.title.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => PRI_ORDER[a.priority]-PRI_ORDER[b.priority]);

  const generateSchedule = async () => {
    setAiLoading(true);
    await new Promise(r=>setTimeout(r,1800));
    setSchedule(DEMO_SCHEDULE);
    setShowSchedule(true);
    setAiLoading(false);
    toast('AI schedule generated — 88 focus score!', 'ai', '✦');

        React.createElement('div', { className:'stat-label' }, 'Overdue'),

      React.createElement('div', { className:'ai-badge' }, '✦ AI Powered'),
      React.createElement('div', { style:{display:'flex',alignItems:'flex-start',gap:16} },
        React.createElement('div', { style:{flex:1} },

          React.createElement('div', { style:{display:'flex',gap:10} },

            ),
            showSchedule && React.createElement('button', { className:'btn btn-ghost', onClick:()=>setShowSchedule(!showSchedule) }, showSchedule?'Hide':'Show')
          )
        )
      ),
      showSchedule && schedule && React.createElement('div', { style:{marginTop:20} },
        React.createElement('div', { style:{display:'flex',alignItems:'center',gap:12,marginBottom:12} },
          React.createElement('div', { style:{fontSize:13,color:'var(--text-dim)'} }, schedule.summary),
          React.createElement('div', { style:{marginLeft:'auto',background:'var(--accent-glow)',border:'1px solid var(--accent)',padding:'4px 10px',borderRadius:6,fontSize:12,color:'var(--accent)',fontFamily:'var(--mono)'} }, '⚡ Focus: '+schedule.focus_score+'/100')
        ),

          schedule.schedule.map((slot,i) =>

              React.createElement('span', { className:'slot-title' }, slot.task_title),

            )

        schedule.tips && React.createElement('div', { style:{marginTop:12,display:'flex',flexDirection:'column',gap:6} },
          schedule.tips.map((tip,i) =>

            filtered.map(t =>

          React.createElement(ProgressRing, { pct: total>1?Math.round(completed/total*100):0 }),
          React.createElement('div', { className:'donut-legend' },
            [['Completed', completed, 'var(--accent2)'], ['Pending', tasks.filter(t=>t.status==='pending').length, 'var(--accent)'], ['In Progress', tasks.filter(t=>t.status==='in_progress').length, 'var(--high)']].map(([l,v,c])=>
              React.createElement('div', { key:l, className:'legend-item' },
                React.createElement('div', { className:'legend-dot', style:{background:c} }),
                React.createElement('span', { style:{color:'var(--text-dim)'} }, l),
                React.createElement('span', { style:{marginLeft:'auto',fontFamily:'var(--mono)',fontWeight:700} }, v)
              )
            )
          )
        )
      ),

      // By Priority
      React.createElement('div', { className:'chart-card' },
        React.createElement('div', { className:'chart-title' }, 'Priority Distribution'),
        React.createElement('div', { className:'bar-chart' },
          [['critical','var(--critical)'],['high','var(--high)'],['medium','var(--medium)'],['low','var(--low)']].map(([p,c]) =>
            React.createElement('div', { key:p, className:'bar-row' },
              React.createElement('span', { className:'bar-label' }, p),
              React.createElement('div', { className:'bar-track' },
                React.createElement('div', { className:'bar-fill', style:{width:(byPri[p]/total*100)+'%', background:c} })
              ),
              React.createElement('span', { className:'bar-val' }, byPri[p])
            )
          )
        )
      ),

      // By Category
      React.createElement('div', { className:'chart-card' },
        React.createElement('div', { className:'chart-title' }, 'Tasks by Category'),
        React.createElement('div', { className:'bar-chart' },
          Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,cnt]) =>
            React.createElement('div', { key:cat, className:'bar-row' },
              React.createElement('span', { className:'bar-label' }, cat),
              React.createElement('div', { className:'bar-track' },
                React.createElement('div', { className:'bar-fill', style:{width:(cnt/total*100)+'%', background:catColors[cat]||'#6c63ff'} })
              ),
              React.createElement('span', { className:'bar-val' }, cnt)
            )
          )
        )
      ),

      // Quick stats
      React.createElement('div', { className:'chart-card' },
        React.createElement('div', { className:'chart-title' }, 'Quick Stats'),
        [
          ['Total Tasks', tasks.length, '📋'],
          ['Completed', tasks.filter(t=>t.status==='completed').length, '✅'],
          ['Overdue', tasks.filter(t=>t.due_date&&new Date(t.due_date)<new Date()&&t.status!=='completed').length, '⚠'],
          ['Critical', tasks.filter(t=>t.priority==='critical').length, '🔥'],
          ['Avg Est.', tasks.filter(t=>t.estimated_minutes).length ? Math.round(tasks.filter(t=>t.estimated_minutes).reduce((s,t)=>s+t.estimated_minutes,0)/tasks.filter(t=>t.estimated_minutes).length)+'m' : '—', '⏱'],
        ].map(([label, val, icon]) =>
          React.createElement('div', { key:label, style:{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--border)',fontSize:14} },
            React.createElement('span', null, icon),
            React.createElement('span', { style:{color:'var(--text-dim)'} }, label),
            React.createElement('span', { style:{marginLeft:'auto',fontFamily:'var(--mono)',fontWeight:700} }, val)
          )
        )
      )
    )
  );
}

// ── Main App ──────────────────────────────────────────────────────
function App() {
  const [tasks, setTasks] = useState(DEMO_TASKS);
  const [view, setView] = useState('dashboard');
  const [modal, setModal] = useState(null); // null | 'new' | task-object
  const [toasts, setToasts] = useState([]);

  const addToast = useCallback((message, type='info', icon='ℹ') => {
    const id = uid();
    setToasts(ts => [...ts, {id, message, type, icon}]);
    setTimeout(() => setToasts(ts => ts.filter(t=>t.id!==id)), 4000);
  }, []);

  const removeToast = id => setToasts(ts => ts.filter(t=>t.id!==id));

  const handleSave = (taskData) => {
    if (taskData.id && tasks.find(t=>t.id===taskData.id)) {
      setTasks(ts => ts.map(t => t.id===taskData.id ? {...t,...taskData} : t));
      addToast('Task updated.', 'success', '✓');
    } else {
      setTasks(ts => [taskData, ...ts]);
      addToast('Task added!', 'success', '✓');
    }
    setModal(null);
  };

  const handleToggle = id => {
    setTasks(ts => ts.map(t => {
      if (t.id!==id) return t;
      const done = t.status!=='completed';
      return {...t, status: done?'completed':'pending', completed_at: done?new Date().toISOString():null};
    }));
    const task = tasks.find(t=>t.id===id);
    if (task && task.status!=='completed') addToast(`"${task.title}" completed! 🎉`, 'success', '✅');
  };

  const handleDelete = id => {
    const task = tasks.find(t=>t.id===id);
    setTasks(ts => ts.filter(t=>t.id!==id));
    if (task) addToast(`"${task.title}" deleted.`, 'error', '🗑');
  };

  const navItems = [
    { id:'dashboard', icon:'⬛', label:'Dashboard', badge: tasks.filter(t=>t.status!=='completed').length },
    { id:'analytics', icon:'📊', label:'Analytics' },
  ];

  return React.createElement('div', { className:'app' },
    // Sidebar
    React.createElement('div', { className:'sidebar' },
      React.createElement('div', { className:'sidebar-logo' },
        React.createElement('div', { className:'logo-icon' }, '✦'),
        React.createElement('div', { className:'logo-text' }, 'TaskMind'),
        React.createElement('div', { className:'logo-badge' }, 'AI')
      ),
      React.createElement('div', { className:'sidebar-nav' },
        React.createElement('div', { className:'nav-section-label' }, 'Main'),
        navItems.map(item =>
          React.createElement('div', { key:item.id, className:`nav-item ${view===item.id?'active':''}`, onClick:()=>setView(item.id) },
            React.createElement('span', { className:'nav-icon' }, item.icon),
            item.label,
            item.badge ? React.createElement('span', { className:'nav-badge' }, item.badge) : null
          )
        ),
        React.createElement('hr', { className:'divider', style:{margin:'16px 0'} }),
        React.createElement('div', { className:'nav-section-label' }, 'Quick Filters'),
        [['🔥','Critical', ()=>{setView('dashboard');}],['⚠','Overdue', ()=>{setView('dashboard');}],['✅','Completed', ()=>{setView('dashboard');}]].map(([icon,label,onClick])=>
          React.createElement('div', { key:label, className:'nav-item', onClick },
            React.createElement('span', { className:'nav-icon' }, icon), label
          )
        )
      ),
      React.createElement('div', { className:'sidebar-footer' },
        React.createElement('div', { className:'user-card' },
          React.createElement('div', { className:'user-avatar' }, 'YU'),
          React.createElement('div', null,
            React.createElement('div', { className:'user-name' }, 'Your Account'),
            React.createElement('div', { className:'user-role' }, 'Pro Plan')
          ),
          React.createElement('div', { className:'user-status' })
        )
      )
    ),

    // Main
    React.createElement('div', { className:'main' },
      React.createElement('div', { className:'topbar' },
        React.createElement('div', null,
          React.createElement('span', { className:'topbar-title' }, view==='dashboard'?'Dashboard':'Analytics'),
          React.createElement('span', { className:'topbar-sub' }, view==='dashboard'?`Good ${new Date().getHours()<12?'morning':'afternoon'} — let\'s get things done.`:'Task performance & AI insights')
        ),
        React.createElement('div', { className:'topbar-right' },
          React.createElement('div', { className:'view-tabs' },
            navItems.map(item =>
              React.createElement('div', { key:item.id, className:`view-tab ${view===item.id?'active':''}`, onClick:()=>setView(item.id) }, item.label)
            )
          ),
          React.createElement('button', { className:'btn btn-primary', onClick:()=>setModal('new') }, '+ New Task')
        )
      ),
      React.createElement('div', { className:'content' },
        view==='dashboard'
          ? React.createElement(Dashboard, { tasks, onAddTask:()=>setModal('new'), onToggle:handleToggle, onDelete:handleDelete, onEdit:t=>setModal(t), toast:addToast })
          : React.createElement(Analytics, { tasks, toast:addToast })
      )
    ),

    // Modal
    modal && React.createElement(TaskModal, {
      task: modal==='new' ? null : modal,
      onSave: handleSave,
      onClose: ()=>setModal(null)
    }),

    // Toasts
    React.createElement(ToastContainer, { toasts, removeToast })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
